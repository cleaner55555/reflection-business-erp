<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reflection ERP — Van mreže</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; background: #fafafa; color: #18181b;
      padding: 1rem; text-align: center;
    }
    .container { max-width: 420px; }
    .icon { font-size: 4rem; margin-bottom: 1.5rem; }
    h1 { font-size: 1.5rem; font-weight: 600; margin-bottom: 0.75rem; }
    p { color: #71717a; line-height: 1.6; margin-bottom: 1.5rem; }
    button {
      background: #09090b; color: white; border: none;
      padding: 0.75rem 1.5rem; border-radius: 0.5rem;
      font-size: 1rem; cursor: pointer; font-weight: 500;
    }
    button:hover { opacity: 0.9; }
    .features {
      margin-top: 2rem; display: flex; gap: 1rem;
      justify-content: center; flex-wrap: wrap;
    }
    .feature {
      background: #f4f4f5; padding: 0.75rem 1rem;
      border-radius: 0.5rem; font-size: 0.875rem; color: #52525b;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>Van mreže</h1>
    <p>Niste povezani na internet. Reflection ERP će raditi sa keširanim podacima. Povežite se za sinhronizaciju.</p>
    <button onclick="window.location.reload()">Pokušaj ponovo</button>
    <div class="features">
      <div class="feature">✅ Keširani podaci dostupni</div>
      <div class="feature">📝 Offline rad aktivan</div>
      <div class="feature">🔄 Auto sinhronizacija</div>
    </div>
  </div>
</body>
</html>
